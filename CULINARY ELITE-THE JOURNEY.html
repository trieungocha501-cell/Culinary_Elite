<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CULINARY ELITE: THE JOURNEY</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --locked: #d1d8e0;
            --bg: #f7f1e3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column; align-items: center; padding: 20px;
        }

        h1 { color: var(--primary); text-shadow: 2px 2px #fff; }

        .menu-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 800px;
        }

        .food-card {
            background: white; padding: 20px; border-radius: 15px; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.3s;
            position: relative;
        }

        .food-card:hover:not(.locked) { transform: translateY(-10px); }
        .food-card.locked { background: var(--locked); filter: grayscale(1); }
        .food-card.locked::after { content: "🔒"; font-size: 2rem; position: absolute; top: 40%; left: 40%; }
        .food-card.done::before { content: "✅"; position: absolute; top: 5px; right: 5px; font-size: 15px; }

        #cooking-screen {
            display: none; background: white; padding: 30px; border-radius: 20px;
            max-width: 500px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #interactive-obj { font-size: 100px; cursor: pointer; margin: 20px; transition: 0.1s; user-select: none; position: relative; }
        
        .pantry-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            background: #f1f2f6; padding: 15px; border-radius: 10px; margin-bottom: 15px;
        }
        .spice-item { 
            font-size: 25px; cursor: pointer; background: white; padding: 5px; 
            border-radius: 8px; transition: 0.2s; border: 2px solid #ddd;
        }
        .spice-item:active { transform: scale(0.9); background: var(--secondary); }

        #heat-wrap { display: none; width: 100%; height: 15px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; position: relative; }
        #heat-bar { width: 0%; height: 100%; background: var(--primary); }
        .win-zone { position: absolute; right: 20%; width: 20%; height: 100%; background: rgba(78, 205, 196, 0.4); border-left: 2px dashed var(--secondary); }

        .btn {
            background: var(--secondary); color: white; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        
        .spice-fx {
            position: absolute; font-size: 30px; pointer-events: none;
            animation: fallDown 0.5s ease-in forwards;
        }
        @keyframes fallDown {
            0% { transform: translateY(-50px); opacity: 1; }
            100% { transform: translateY(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>👨‍🍳 CULINARY ELITE 👩‍🍳</h1>

    <div id="menu" class="menu-container"></div>

    <div id="cooking-screen">
        <h2 id="cook-title"></h2>
        <div id="interactive-obj" onclick="hitObject()"></div>
        <p id="cook-hint" style="font-weight: bold; color: var(--primary);"></p>

        <div class="pantry-grid">
            <div class="spice-item" onclick="addSpice('🧴')">🧴<br><small>Dầu</small></div>
            <div class="spice-item" onclick="addSpice('🧂')">🧂<br><small>Muối</small></div>
            <div class="spice-item" onclick="addSpice('🌑')">🌑<br><small>Tiêu</small></div>
            <div class="spice-item" onclick="addSpice('🍬')">🍬<br><small>Đường</small></div>
            <div class="spice-item" onclick="addSpice('🌶️')">🌶️<br><small>Ớt</small></div>
            <div class="spice-item" onclick="addSpice('🥫')">🥫<br><small>Cà</small></div>
            <div class="spice-item" onclick="addSpice('🍶')">🍶<br><small>Mắm</small></div>
            <div class="spice-item" onclick="addSpice('🫗')">🫗<br><small>Nước</small></div>
        </div>

        <div id="heat-wrap"><div class="win-zone"></div><div id="heat-bar"></div></div>

        <button id="main-btn" class="btn" onclick="handleLogic()">BẬT LỬA NẤU! 🔥</button>
        <button class="btn" style="background: #95a5a6;" onclick="backToMenu()">Rời bếp</button>
        <button class="btn" style="background: #e74c3c; display: block; margin: 10px auto;" onclick="resetProgress()">Xóa tiến trình</button>
    </div>

    <script>
        const dishes = [
            { id: 1, name: "Trứng Ốp La", icon: "🍳", raw: ["🥚"], completed: false },
            { id: 2, name: "Mì Tôm Ramen", icon: "🍜", raw: ["🍜", "🥚", "🥬"], completed: false },
            { id: 3, name: "Bánh Mì Kẹp", icon: "🥪", raw: ["🥖", "🥩", "🥗"], completed: false },
            { id: 4, name: "Pizza Hải Sản", icon: "🍕", raw: ["🥯", "🦐", "🧀"], completed: false },
            { id: 5, name: "Gà Rán", icon: "🍗", raw: ["🍗", "🍞"], completed: false },
            { id: 6, name: "Lẩu Thái", icon: "🍲", raw: ["🥘", "🦐", "🐚", "🥬"], completed: false },
            { id: 7, name: "Sushi Cá Hồi", icon: "🍣", raw: ["🐟", "🍚", "🍙"], completed: false },
            { id: 8, name: "Tacos Mexico", icon: "🌮", raw: ["🌮", "🥩", "🍅"], completed: false },
            { id: 9, name: "Kem Vani", icon: "🍦", raw: ["🥛", "🧊", "🍦"], completed: false },
            { id: 10, name: "Cà Phê Sữa", icon: "☕", raw: ["☕", "🥛"], completed: false },
            { id: 11, name: "Bún Chả", icon: "🥓", raw: ["🥩", "🍜", "🥗"], completed: false },
            { id: 12, name: "Salad Nga", icon: "🥗", raw: ["🥗", "🥔", "🥚"], completed: false },
            { id: 13, name: "Sườn Xào Chua Ngọt", icon: "🍖", raw: ["🍖", "🧅", "🍍"], completed: false },
            { id: 14, name: "Bánh Ngọt Pháp", icon: "🍰", raw: ["🍰", "🍓", "🥛"], completed: false },
            { id: 15, name: "Cơm Chiên Dương Châu", icon: "🍚", raw: ["🍚", "🥕", "🍖", "🥚"], completed: false },
            { id: 16, name: "Phở Bò", icon: "🥣", raw: ["🥩", "🍜", "🧅"], completed: false },
            { id: 17, name: "Gỏi Cuốn", icon: "🌯", raw: ["🌯", "🦐", "🥬"], completed: false },
            { id: 18, name: "Bánh Bao", icon: "🥯", raw: ["🥯", "🥩", "🥚"], completed: false },
            { id: 19, name: "Tôm Hùm Nướng", icon: "🦞", raw: ["🦞", "🧈", "🧄"], completed: false },
            { id: 20, name: "Bít Tết Bò", icon: "🥩", raw: ["🥩", "🥔", "🍷"], completed: false }
        ];

        let currentDish = null;
        let step = 0; 
        let hits = 0;
        let ingredientIndex = 0; 
        let isCooking = false;
        let timer = null;

        function loadProgress() {
            const saved = localStorage.getItem('culinary_elite_completed');
            if (saved) {
                const completedIds = JSON.parse(saved);
                dishes.forEach(dish => {
                    if (completedIds.includes(dish.id)) dish.completed = true;
                });
            }
        }

        function saveProgress() {
            const completedIds = dishes.filter(d => d.completed).map(d => d.id);
            localStorage.setItem('culinary_elite_completed', JSON.stringify(completedIds));
        }

        function resetProgress() {
            if (confirm("Chủ nhân chắc chắn muốn xóa hết tiến trình chứ?")) {
                localStorage.removeItem('culinary_elite_completed');
                location.reload();
            }
        }

        function renderMenu() {
            const menuEl = document.getElementById('menu');
            menuEl.innerHTML = '';
            
            dishes.forEach((dish, index) => {
                let isLocked = false;
                // LOGIC THEO YÊU CẦU: 
                // Món 1, 2, 3 mặc định mở. 
                // Món n (n >= 4) chỉ mở khi TẤT CẢ các món trước nó (từ 1 đến n-1) đã hoàn thành (completed: true).
                if (index >= 3) {
                    for (let i = 0; i < index; i++) {
                        if (!dishes[i].completed) {
                            isLocked = true;
                            break;
                        }
                    }
                }

                const card = document.createElement('div');
                card.className = `food-card ${isLocked ? 'locked' : ''} ${dish.completed ? 'done' : ''}`;
                card.onclick = () => isLocked ? null : openCookScreen(dish.id);
                card.innerHTML = `<div style="font-size:50px">${dish.icon}</div><div>${dish.name}</div>`;
                menuEl.appendChild(card);
            });
        }

        function openCookScreen(id) {
            currentDish = dishes.find(d => d.id === id);
            step = 0; hits = 0; ingredientIndex = 0; isCooking = false;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('cooking-screen').style.display = 'block';
            document.getElementById('cook-title').innerText = currentDish.name;
            document.getElementById('interactive-obj').innerText = currentDish.raw[0];
            document.getElementById('cook-hint').innerText = `Sơ chế nguyên liệu ${ingredientIndex + 1}/${currentDish.raw.length}`;
            document.getElementById('heat-wrap').style.display = 'none';
            document.getElementById('heat-bar').style.width = '0%';
            document.getElementById('main-btn').style.opacity = "0.5";
            document.getElementById('main-btn').innerText = "Hãy sơ chế trước";
        }

        function hitObject() {
            if (step === 0) {
                hits++;
                if (hits >= 5) {
                    hits = 0;
                    ingredientIndex++;
                    if (ingredientIndex < currentDish.raw.length) {
                        document.getElementById('interactive-obj').innerText = currentDish.raw[ingredientIndex];
                        document.getElementById('cook-hint').innerText = `Sơ chế nguyên liệu ${ingredientIndex + 1}/${currentDish.raw.length}`;
                    } else {
                        step = 1;
                        document.getElementById('interactive-obj').innerText = currentDish.icon;
                        document.getElementById('cook-hint').innerText = "Nêm nếm tự do rồi Bật lửa nấu nhé!";
                        document.getElementById('main-btn').style.opacity = "1";
                        document.getElementById('main-btn').innerText = "BẬT LỬA NẤU! 🔥";
                    }
                }
            }
        }

        function addSpice(icon) {
            if (step === 0) { alert("Sơ chế đồ ăn trước đã chủ nhân ơi!"); return; }
            const container = document.getElementById('interactive-obj');
            const spiceFx = document.createElement('div');
            spiceFx.className = 'spice-fx';
            spiceFx.innerText = icon;
            spiceFx.style.left = Math.random() * 80 + '%';
            container.appendChild(spiceFx);
            setTimeout(() => spiceFx.remove(), 500);
        }

        function handleLogic() {
            if (step === 0) return;
            const btn = document.getElementById('main-btn');
            if (!isCooking) {
                isCooking = true;
                document.getElementById('heat-wrap').style.display = 'block';
                btn.innerText = "DỪNG LẠI!";
                let w = 0;
                timer = setInterval(() => {
                    w += 2.5;
                    document.getElementById('heat-bar').style.width = w + "%";
                    if (w > 100) {
                        clearInterval(timer);
                        alert("CHÁY RỒI! Đừng nêm nếm mải mê quá nha 😭");
                        openCookScreen(currentDish.id);
                    }
                }, 60);
            } else {
                clearInterval(timer);
                const finalW = parseFloat(document.getElementById('heat-bar').style.width);
                if (finalW >= 60 && finalW <= 85) {
                    alert("Món ăn hoàn hảo! Chủ nhân đúng là Master Chef.");
                    currentDish.completed = true;
                    saveProgress();
                    backToMenu();
                } else {
                    alert("Lửa chưa đạt rồi, nấu lại thôi!");
                    openCookScreen(currentDish.id);
                }
            }
        }

        function backToMenu() {
            if(timer) clearInterval(timer);
            document.getElementById('menu').style.display = 'grid';
            document.getElementById('cooking-screen').style.display = 'none';
            renderMenu();
        }

        loadProgress();
        renderMenu();
    </script>
</body>
</html>
